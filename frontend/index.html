<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="theme-color" content="#0c0c12" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#faf8f5" media="(prefers-color-scheme: light)" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/logo.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-192.png" />
    <link rel="mask-icon" href="/logo.png" color="#E05A1A" />

    <!-- Performance: Preconnect to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://sureword.fly.dev" />
    <link rel="dns-prefetch" href="https://sureword.fly.dev" />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />

    <!-- Primary Meta -->
    <title>SureWord Radio - The Whole Word to the Whole World</title>
    <meta name="description" content="SureWord Radio brings the whole Word to the whole world. Listen to live broadcasts, on-demand sermons, Christian podcasts, worship music, and join our prayer community — 24/7." />
    <meta name="keywords" content="SureWord Radio, live broadcast, sermons, Christian podcast, worship music, church radio, scripture, prayer, Sure Word Media, gospel, faith, online radio" />
    <meta name="author" content="Sure Word Media" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="googlebot" content="index, follow" />
    <meta name="bingbot" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />

    <!-- Canonical -->
    <link rel="canonical" href="https://surewordradio.org/" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="SureWord Radio" />
    <meta property="og:title" content="SureWord Radio - The Whole Word to the Whole World" />
    <meta property="og:description" content="Listen to live broadcasts, on-demand sermons, Christian podcasts, worship music, and join our prayer community — 24/7." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://surewordradio.org/" />
    <meta property="og:image" content="https://surewordradio.org/logo.png" />
    <meta property="og:image:alt" content="SureWord Radio logo - The Whole Word to the Whole World" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SureWord Radio - The Whole Word to the Whole World" />
    <meta name="twitter:description" content="Listen to live broadcasts, on-demand sermons, Christian podcasts, worship music, and join our prayer community — 24/7." />
    <meta name="twitter:image" content="https://surewordradio.org/logo.png" />
    <meta name="twitter:image:alt" content="SureWord Radio logo" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SureWord Radio" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Color scheme -->
    <meta name="color-scheme" content="dark light" />
